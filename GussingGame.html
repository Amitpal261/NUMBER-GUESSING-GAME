<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="GussingGame.css">
</head>

<body>

    <div class="container">

        <h1>🎮 Number Guessing Game</h1>
        <p class="message">Guess the number between 1 - 30</p>

        <div class="score">
            Score: <span id="score">5</span>
        </div>

        <div class="number-grid">

            <button value="1">1</button>
            <button value="2">2</button>
            <button value="3">3</button>
            <button value="4">4</button>
            <button value="5">5</button>
            <button value="6">6</button>
            <button value="7">7</button>
            <button value="8">8</button>
            <button value="9">9</button>
            <button value="10">10</button>
            <button value="11">11</button>
            <button value="12">12</button>
            <button value="13">13</button>
            <button value="14">14</button>
            <button value="15">15</button>
            <button value="16">16</button>
            <button value="17">17</button>
            <button value="18">18</button>
            <button value="19">19</button>
            <button value="20">20</button>
            <button value="21">21</button>
            <button value="22">22</button>
            <button value="23">23</button>
            <button value="24">24</button>
            <button value="25">25</button>
            <button value="26">26</button>
            <button value="27">27</button>
            <button value="28">28</button>
            <button value="29">29</button>
            <button value="30">30</button>

        </div>

        <button class="restart">Restart Game</button>

    </div>

    <script src="GussingGame.js"></script>
</body>

</html>
